name: Forex Signals Bot — Consensus 5 IA, Scan 30min

on:
  schedule:
    - cron: '0,30 * * * *'   # Toutes les 30 minutes (XX:00 et XX:30)
  workflow_dispatch:          # Bouton "Run" manuel depuis GitHub

jobs:
  send-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installation Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Installation des dépendances
        run: pip install -r requirements.txt

      - name: Installation des modeles IA additionnels
        run: |
          pip install uni2ts granite-tsfm
          pip install git+https://github.com/time-series-foundation-models/lag-llama.git
          pip install "transformers<4.50"  # compat torch 2.4 (uni2ts) - evite l'erreur DTensor

      - name: Lancement de l'analyse Forex
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          USE_TIMESFM: 'true'
          DATA_INTERVAL: '15m'
          SIGNAL_FREQUENCY_HOURS: '1'
          LOG_LEVEL: 'INFO'
        run: python run_once.py

      - name: Commit et Push de signals.json
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add signals.json
          git commit -m "chore: update signals.json [skip ci]" || echo "Aucune modification à commiter"
          git push

      - name: Sauvegarde des logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forex-logs-${{ github.run_number }}
          path: logs/signals.log
          retention-days: 7
