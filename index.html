<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Signals — Google TimesFM AI</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --success: #10b981;
            --danger: #ef4444;
            --text-color: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
        }

        header {
            padding: 2.5rem 1rem;
            text-align: center;
            border-bottom: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            background: rgba(11, 15, 25, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo i {
            color: var(--primary);
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 1.2rem 2rem;
            border-radius: 16px;
            margin-bottom: 2.5rem;
            backdrop-filter: blur(8px);
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .signals-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(16px);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .pair-name {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .badge {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-buy {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge-sell {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .price-section {
            margin-bottom: 1.8rem;
        }

        .price-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .price-value {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .targets {
            background: rgba(255, 255, 255, 0.01);
            border-radius: 16px;
            padding: 1rem 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .target-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.95rem;
        }

        .target-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .target-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
        }

        .target-value {
            font-weight: 600;
        }

        .target-success { color: var(--success); }
        .target-danger { color: var(--danger); }

        .confidence-section {
            margin-top: 1.5rem;
        }

        .confidence-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }

        .confidence-bar-bg {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }

        .confidence-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, #818cf8 100%);
            border-radius: 4px;
            transition: width 1s ease;
        }

        .indicators {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1.5rem;
        }

        .indicator-box {
            text-align: center;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0.6rem;
            border-radius: 12px;
        }

        .ind-val {
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 0.2rem;
        }

        .ind-lbl {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .no-signals {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
        }

        .no-signals i {
            font-size: 3rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .no-signals h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .no-signals p {
            color: var(--text-muted);
        }

        footer {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--card-border);
            margin-top: 5rem;
        }

        footer a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fa-solid fa-chart-line"></i>
            <span>Forex Signals AI</span>
        </div>
        <div class="subtitle">Google TimesFM 2.5 Engine</div>
    </header>

    <div class="container">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot"></div>
                <span>Mise à jour horaire active</span>
            </div>
            <div class="status-item">
                <span style="color: var(--text-muted)">Dernier scan :</span>
                <strong id="last-update">-</strong>
            </div>
        </div>

        <!-- Grid of Signals -->
        <div class="signals-grid" id="signals-container">
            <div style="grid-column: 1/-1; text-align: center; padding: 3rem;">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--primary)"></i>
                <p style="margin-top: 1rem; color: var(--text-muted)">Chargement des signaux en cours...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Taxi77777. Propulsé par Google TimesFM 2.5 & GitHub Pages.</p>
        <p style="margin-top: 0.5rem; font-size: 0.75rem; color: var(--text-muted)">Usage éducatif uniquement — Aucun conseil financier.</p>
    </footer>

    <script>
        // Fonction pour formater la date
        function formatDate(dateStr) {
            if (!dateStr) return "-";
            const date = new Date(dateStr);
            return date.toLocaleString('fr-FR', {
                day: 'numeric',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Europe/Paris'
            }) + " (Paris)";
        }

        // Récupérer et afficher les signaux
        async function loadSignals() {
            const container = document.getElementById('signals-container');
            const lastUpdateElem = document.getElementById('last-update');
            
            try {
                // Charger le fichier JSON généré par GitHub Actions
                // Version avec anti-cache pour toujours avoir le dernier fichier
                const response = await fetch('signals.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Fichier introuvable");
                
                const data = await response.json();
                
                lastUpdateElem.innerText = formatDate(data.last_update);
                
                const strongSignals = data.signals || [];
                
                if (strongSignals.length === 0) {
                    container.innerHTML = `
                        <div class="no-signals">
                            <i class="fa-solid fa-square-minus"></i>
                            <h3>Aucun signal fort détecté</h3>
                            <p>L'IA de Google n'a détecté aucune opportunité forte (Confiance &ge; 70%) sur les 37 devises lors de la dernière heure.</p>
                        </div>
                    `;
                    return;
                }
                
                let cardsHtml = '';
                strongSignals.forEach(sig => {
                    const isBuy = sig.signal === 'BUY';
                    const badgeClass = isBuy ? 'badge-buy' : 'badge-sell';
                    const targetClass = isBuy ? 'target-success' : 'target-danger';
                    const stopClass = isBuy ? 'target-danger' : 'target-success';
                    
                    cardsHtml += `
                        <div class="card">
                            <div class="card-header">
                                <div class="pair-name">${sig.pair_name}</div>
                                <span class="badge ${badgeClass}">${sig.signal}</span>
                            </div>
                            
                            <div class="price-section">
                                <div class="price-label">PRIX ACTUEL</div>
                                <div class="price-value">${sig.current_price}</div>
                            </div>
                            
                            <div class="targets">
                                <div class="target-row">
                                    <span class="target-label"><i class="fa-solid fa-bullseye target-success"></i> Take Profit</span>
                                    <span class="target-value ${targetClass}">${sig.take_profit}</span>
                                </div>
                                <div class="target-row">
                                    <span class="target-label"><i class="fa-solid fa-shield-halved target-danger"></i> Stop Loss</span>
                                    <span class="target-value ${stopClass}">${sig.stop_loss}</span>
                                </div>
                            </div>
                            
                            <div class="confidence-section">
                                <div class="confidence-header">
                                    <span style="color: var(--text-muted)">CONFIANCE IA</span>
                                    <strong style="color: var(--primary)">${sig.confidence}%</strong>
                                </div>
                                <div class="confidence-bar-bg">
                                    <div class="confidence-bar-fill" style="width: ${sig.confidence}%"></div>
                                </div>
                            </div>
                            
                            <div class="indicators">
                                <div class="indicator-box">
                                    <div class="ind-lbl">RSI</div>
                                    <div class="ind-val">${sig.rsi}</div>
                                </div>
                                <div class="indicator-box">
                                    <div class="ind-lbl">MACD</div>
                                    <div class="ind-val" style="font-size: 0.75rem">${sig.macd_trend.split(' ')[0]}</div>
                                </div>
                                <div class="indicator-box">
                                    <div class="ind-lbl">Tendance</div>
                                    <div class="ind-val">${sig.forecast_dir}</div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = cardsHtml;
                
            } catch (err) {
                console.error(err);
                container.innerHTML = `
                    <div class="no-signals" style="border-color: var(--danger)">
                        <i class="fa-solid fa-circle-exclamation" style="color: var(--danger)"></i>
                        <h3>Erreur de chargement</h3>
                        <p>Impossible de lire les signaux. Le premier scan de GitHub Actions doit se terminer.</p>
                    </div>
                `;
            }
        }
        
        loadSignals();
    </script>
</body>
</html>
